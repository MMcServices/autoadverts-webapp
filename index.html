<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoAdverts</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }
    .header {
      background: #1a1a1a;
      padding: 14px;
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      border-bottom: 1px solid #333;
    }
    .content {
      padding: 16px;
      padding-bottom: 90px;
      overflow-y: auto;
      height: calc(100vh - 150px);
    }
    .plan-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .plan-info h3 {
      margin: 0 0 6px 0;
      font-size: 18px;
    }
    .plan-info p {
      margin: 0;
      color: #aaa;
      font-size: 14px;
    }
    .price {
      font-size: 26px;
      font-weight: 700;
      color: #00d4ff;
    }
    button {
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    .btn-info { background: #333; color: white; }
    .btn-purchase { background: #2481cc; color: white; }
    .form-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    input {
      width: 100%;
      background: #222;
      border: none;
      border-radius: 8px;
      padding: 14px;
      color: white;
      margin: 10px 0;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a1a;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #333;
    }
    .nav-item {
      text-align: center;
      color: #aaa;
      font-size: 11px;
      cursor: pointer;
    }
    .nav-item.active { color: #fff; }
  </style>
</head>
<body>
  <div class="header">#1 Automated Advertising Bot</div>

  <!-- PURCHASE PAGE -->
  <div id="purchase-page" class="content">
    <h2>Choose your plan</h2>
    
    <div class="plan-card">
      <div class="plan-info">
        <h3>STARTER</h3>
        <p>20 Accounts</p>
      </div>
      <div>
        <div class="price">$15</div>
        <button class="btn-info" onclick="showInfo(15)">More Info</button>
        <button class="btn-purchase" onclick="buyPlan(15)">Purchase</button>
      </div>
    </div>

    <div class="plan-card">
      <div class="plan-info">
        <h3>PREMIUM</h3>
        <p>40 Accounts</p>
      </div>
      <div>
        <div class="price">$35</div>
        <button class="btn-info" onclick="showInfo(35)">More Info</button>
        <button class="btn-purchase" onclick="buyPlan(35)">Purchase</button>
      </div>
    </div>

    <div class="plan-card">
      <div class="plan-info">
        <h3>ULTIMATE</h3>
        <p>100 Accounts</p>
      </div>
      <div>
        <div class="price">$80</div>
        <button class="btn-info" onclick="showInfo(80)">More Info</button>
        <button class="btn-purchase" onclick="buyPlan(80)">Purchase</button>
      </div>
    </div>
  </div>

  <!-- SUBMIT AD PAGE -->
  <div id="ads-page" class="content" style="display:none;">
    <h2>📤 Submit New Ad</h2>
    <div class="form-card">
      <p>Paste the full link of your ad message:</p>
      <input type="text" id="ad-link" placeholder="https://t.me/c/123456789/42" />
      <button class="btn-purchase" onclick="submitAd()">Submit Ad to All Accounts</button>
    </div>
  </div>

  <!-- SERVICES -->
  <div id="services-page" class="content" style="display:none;">
    <h2>📋 My Services</h2>
    <p id="services-content">No active plan yet. Purchase one above.</p>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <div class="nav-item" onclick="switchTab(0)">🛒<br>Purchase</div>
    <div class="nav-item" onclick="switchTab(1)">📤<br>Submit Ad</div>
    <div class="nav-item" onclick="switchTab(2)">📋<br>Services</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.setHeaderColor("#0f0f0f");

    function switchTab(tab) {
      document.querySelectorAll('.content').forEach(el => el.style.display = 'none');
      const pages = ['purchase-page', 'ads-page', 'services-page'];
      document.getElementById(pages[tab]).style.display = 'block';

      document.querySelectorAll('.nav-item').forEach((el, i) => {
        el.classList.toggle('active', i === tab);
      });
    }

    function buyPlan(price) {
      tg.sendData(JSON.stringify({ action: "buy_plan", price: price }));
      tg.showAlert(`Payment for $${price} plan started!`);
    }

    function submitAd() {
      const link = document.getElementById('ad-link').value.trim();
      if (!link) {
        tg.showAlert("Please paste your ad message link");
        return;
      }
      tg.sendData(JSON.stringify({ action: "submit_ad", link: link }));
      tg.showAlert("✅ Ad submitted to all your accounts!");
      document.getElementById('ad-link').value = '';
    }

    function showInfo(price) {
      const info = price === 15 ? "20 Accounts" : price === 35 ? "40 Accounts" : "100 Accounts";
      tg.showAlert(`Plan includes ${info} forwarding accounts.`);
    }

    // Start on Purchase tab
    switchTab(0);
  </script>
</body>
</html>
