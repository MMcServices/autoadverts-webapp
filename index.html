<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoAdverts</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }
    .header { background: #1a1a1a; padding: 14px; text-align: center; font-size: 17px; font-weight: 600; }
    .content { padding: 16px; padding-bottom: 90px; overflow-y: auto; height: calc(100vh - 150px); }
    .card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    .btn-purchase { background: #2481cc; color: white; }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a1a;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #333;
    }
    .nav-item {
      text-align: center;
      color: #aaa;
      font-size: 11px;
      cursor: pointer;
    }
    .nav-item.active { color: #fff; }
  </style>
</head>
<body>
  <div class="header">#1 Automated Advertising Bot</div>

  <div class="content">
    <!-- PURCHASE PAGE -->
    <div id="purchase-page" class="content">
      <h2>Choose your plan</h2>
      <div class="card" onclick="buyPlan(15)">STARTER — $15/mo (20 accounts)</div>
      <div class="card" onclick="buyPlan(35)">PREMIUM — $35/mo (40 accounts)</div>
      <div class="card" onclick="buyPlan(80)">ULTIMATE — $80/mo (100 accounts)</div>
    </div>

    <!-- SERVICES PAGE -->
    <div id="services-page" class="content" style="display:none;">
      <h2>Your Services</h2>
      <div class="card" id="services-content">
        <p><strong>No Active Services</strong></p>
        <p>You don't have any running subscription plans right now.</p>
        <button class="btn-purchase" onclick="switchTab(0)">Explore Plans</button>
      </div>
    </div>

    <!-- SUBMIT AD PAGE -->
    <div id="ads-page" class="content" style="display:none;">
      <h2>Submit New Ad</h2>
      <div class="card">
        <input type="text" id="ad-link" placeholder="Paste your ad message link" style="width:100%;padding:12px;background:#222;color:white;border:none;border-radius:8px;margin-bottom:10px;">
        <button class="btn-purchase" onclick="submitAd()">Submit Ad</button>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <div class="nav-item" onclick="switchTab(0)">🛒 Purchase</div>
    <div class="nav-item" onclick="switchTab(1)">📋 Services</div>
    <div class="nav-item" onclick="switchTab(2)">📤 Submit Ad</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let hasActivePlan = false;

    function switchTab(tab) {
      document.querySelectorAll('.content').forEach(el => el.style.display = 'none');
      const pages = ['purchase-page', 'services-page', 'ads-page'];
      document.getElementById(pages[tab]).style.display = 'block';

      document.querySelectorAll('.nav-item').forEach((el, i) => {
        el.classList.toggle('active', i === tab);
      });
    }

    function buyPlan(price) {
      tg.sendData(JSON.stringify({ action: "buy_plan", price: price }));
      tg.showAlert(`Payment for $${price} started!`);
      hasActivePlan = true;
      // Switch to Services after purchase
      switchTab(1);
    }

    function submitAd() {
      const link = document.getElementById('ad-link').value.trim();
      if (!link) return tg.showAlert("Paste your ad link first");
      
      tg.sendData(JSON.stringify({ action: "submit_ad", link: link }));
      tg.showAlert("✅ Ad submitted to your accounts!");
      document.getElementById('ad-link').value = '';
    }

    // Start on Purchase tab
    switchTab(0);
  </script>
</body>
</html>
