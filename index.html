<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoAdverts</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }
    .header { background: #1a1a1a; padding: 14px; text-align: center; font-size: 17px; font-weight: 600; }
    .content { padding: 16px; padding-bottom: 90px; overflow-y: auto; height: calc(100vh - 150px); }
    .plan-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .price { font-size: 26px; font-weight: 700; color: #00d4ff; }
    button { padding: 10px 18px; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; }
    .btn-purchase { background: #2481cc; color: white; }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: #1a1a1a;
      border-radius: 16px;
      width: 90%;
      max-width: 380px;
      padding: 20px;
    }
    .modal-header { font-size: 20px; font-weight: 600; margin-bottom: 10px; }
    .modal-price { font-size: 28px; font-weight: 700; color: #00d4ff; }
    ul { list-style: none; padding: 0; }
    li { margin: 10px 0; display: flex; align-items: center; }
    li:before { content: "✅"; margin-right: 10px; color: #00ff9d; }
    .close-btn, .purchase-btn {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border-radius: 10px;
      font-weight: 600;
    }
    .close-btn { background: #333; color: white; }
    .purchase-btn { background: #2481cc; color: white; }
  </style>
</head>
<body>
  <div class="header">#1 Automated Advertising Bot</div>

  <div class="content">
    <h2>Choose your plan</h2>
    
    <div class="plan-card" onclick="showPlanModal(15)">
      <div>
        <strong>STARTER</strong><br>
        <span style="color:#aaa">20 Accounts</span>
      </div>
      <div class="price">$15</div>
    </div>

    <div class="plan-card" onclick="showPlanModal(35)">
      <div>
        <strong>PREMIUM</strong><br>
        <span style="color:#aaa">40 Accounts</span>
      </div>
      <div class="price">$35</div>
    </div>

    <div class="plan-card" onclick="showPlanModal(80)">
      <div>
        <strong>ULTIMATE</strong><br>
        <span style="color:#aaa">100 Accounts</span>
      </div>
      <div class="price">$80</div>
    </div>
  </div>

  <!-- Plan Detail Modal -->
  <div id="plan-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header" id="modal-title">STARTER</div>
      <div class="modal-price" id="modal-price">$15/mo</div>
      
      <ul id="modal-features">
        <!-- Filled by JS -->
      </ul>

      <button class="purchase-btn" onclick="confirmPurchase()">🛒 Purchase Plan</button>
      <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav" style="position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;display:flex;justify-content:space-around;padding:10px 0;border-top:1px solid #333;">
    <div onclick="switchTab(0)">🛒 Purchase</div>
    <div onclick="switchTab(1)">📤 Submit Ad</div>
    <div onclick="switchTab(2)">📋 Services</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let currentPrice = 15;

    function showPlanModal(price) {
      currentPrice = price;
      const title = price === 15 ? "STARTER" : price === 35 ? "PREMIUM" : "ULTIMATE";
      const accounts = price === 15 ? "20" : price === 35 ? "40" : "100";

      document.getElementById("modal-title").textContent = title;
      document.getElementById("modal-price").textContent = `$${price}/mo`;

      const features = `
        <li>${accounts} Forwarding Accounts</li>
        <li>Premium Group List (~50+ Marketplaces)</li>
        <li>Forward or Send every hour</li>
        <li>Automated Message Updates</li>
        <li>Up to 2 messages on rotation</li>
        <li>Free Account Customization</li>
        <li>Free Auto-Responder</li>
      `;
      document.getElementById("modal-features").innerHTML = features;

      document.getElementById("plan-modal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("plan-modal").style.display = "none";
    }

    function confirmPurchase() {
      tg.sendData(JSON.stringify({ action: "buy_plan", price: currentPrice }));
      tg.showAlert(`Payment for $${currentPrice} plan started!`);
      closeModal();
    }

    function switchTab(tab) {
      // You can expand this later for other pages
      tg.showAlert("Coming soon");
    }

    // Close modal when clicking outside
    document.getElementById("plan-modal").addEventListener("click", function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
