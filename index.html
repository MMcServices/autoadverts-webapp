<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AutoAdverts</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }
    .header {
      background: #1a1a1a;
      padding: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
    }
    .content {
      padding: 16px;
      padding-bottom: 100px;
      overflow-y: auto;
      height: calc(100vh - 160px);
    }
    .card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
    }
    .btn-purchase { background: #2481cc; color: white; }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a1a;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      border-top: 1px solid #333;
    }
    .nav-item {
      text-align: center;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
    }
    .nav-item.active { color: #00d4ff; }
  </style>
</head>
<body>
  <div class="header">#1 Automated Advertising Bot</div>

  <div class="content" id="main-content">
    <h2 style="text-align:center;">Welcome</h2>
    <div class="card">
      <p>Choose a plan to get started with automated advertising.</p>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <div class="nav-item active" onclick="showPage(0)">🛒 Purchase</div>
    <div class="nav-item" onclick="showPage(1)">📤 Submit Ad</div>
    <div class="nav-item" onclick="showPage(2)">📋 Services</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.setHeaderColor("#0f0f0f");

    function showPage(page) {
      const content = document.getElementById('main-content');
      if (page === 0) {
        content.innerHTML = `
          <h2>Choose your plan</h2>
          <div class="card" onclick="buyPlan(15)">STARTER - $15/mo (20 accounts)</div>
          <div class="card" onclick="buyPlan(35)">PREMIUM - $35/mo (40 accounts)</div>
          <div class="card" onclick="buyPlan(80)">ULTIMATE - $80/mo (100 accounts)</div>
        `;
      } else if (page === 1) {
        content.innerHTML = `
          <h2>Submit Ad</h2>
          <input type="text" id="link" placeholder="Paste ad message link here" style="width:100%;padding:12px;background:#222;color:white;border:none;border-radius:8px;">
          <button class="btn-purchase" onclick="submitAd()">Submit Ad</button>
        `;
      } else {
        content.innerHTML = `<h2>Services</h2><p>No active services yet.</p>`;
      }
    }

    function buyPlan(price) {
      tg.sendData(JSON.stringify({ action: "buy_plan", price: price }));
      tg.showAlert(`Payment for $${price} started!`);
    }

    function submitAd() {
      const link = document.getElementById('link').value.trim();
      if (link) {
        tg.sendData(JSON.stringify({ action: "submit_ad", link: link }));
        tg.showAlert("Ad submitted successfully!");
      } else {
        tg.showAlert("Please paste your ad link");
      }
    }

    // Start on Purchase page
    showPage(0);
  </script>
</body>
</html>
