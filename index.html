<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoAdverts</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 20px;
      height: 100vh;
    }
    .header {
      background: #1a1a1a;
      padding: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      background: #2481cc;
      color: white;
    }
  </style>
</head>
<body>
  <div class="header">#1 Automated Advertising Bot</div>

  <div class="card">
    <h2>Welcome</h2>
    <p>Choose a plan to get started</p>
  </div>

  <div class="card" onclick="buyPlan(15)">
    <strong>STARTER</strong><br>
    $15/mo — 20 Accounts
  </div>

  <div class="card" onclick="buyPlan(35)">
    <strong>PREMIUM</strong><br>
    $35/mo — 40 Accounts
  </div>

  <div class="card" onclick="buyPlan(80)">
    <strong>ULTIMATE</strong><br>
    $80/mo — 100 Accounts
  </div>

  <div class="card">
    <h3>Your Services</h3>
    <p id="services-text">No active plan yet</p>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function buyPlan(price) {
      tg.sendData(JSON.stringify({ action: "buy_plan", price: price }));
      tg.showAlert(`Payment for $${price} started!`);
      document.getElementById("services-text").innerHTML = `Active Plan: $${price}/mo`;
    }
  </script>
</body>
</html>
